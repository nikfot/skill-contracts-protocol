# Investigate Host Health

## Context

This skill is designed for autonomous agents that run without human supervision.
The agent receives an alert (e.g. from PagerDuty, Prometheus, or Elastic Alerting),
invokes this skill, and must produce a complete diagnostic report before it can
declare the investigation done.

## Investigation Process

### 1. Gather node metrics
Query Elasticsearch for CPU, memory, and disk usage on the affected host.
Look for sustained pressure (>85% for 5+ minutes) rather than transient spikes.

### 2. Check pod health
List all pods on the node. Flag any in CrashLoopBackOff, Evicted, or with
high restart counts (>3 in the last hour).

### 3. Review system logs
Check for kernel OOM kills, disk I/O errors, NIC link flaps, or hardware
fault messages. These often explain why Kubernetes marks the node NotReady.

### 4. Correlate and hypothesize
Cross-reference the timeline: did resource pressure precede pod failures?
Did a specific workload trigger the pressure? Formulate at least one
actionable hypothesis.

## Output Format

The final report should include:
- **Affected node**: hostname, role, age
- **Resource timeline**: when pressure started, peak values
- **Pod impact**: which workloads were affected
- **Root cause hypothesis**: what likely caused the degradation
- **Recommended action**: restart, drain, scale, or investigate further
