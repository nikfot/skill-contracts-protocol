# Investigate Proxy Latency

This skill guides the investigation of proxy latency SLO burn rate alerts.

## Investigation flow

1. Verify data exists for the target domain
2. Compute latency percentiles over the alert window
3. Analyze error rates and status code distribution
4. Decompose latency by network path component (DNS, TCP, TLS, header)
5. Check dimensional concentration (region, CSP, AZ, monitor)
6. Generate report
