  plan:
    - tool: run_es_query
      description: Fetch raw heartbeat data for the target service domain
      args_template:
        query_type: esql
        index_pattern: "heartbeat-*"
        query: "FROM heartbeat-* | WHERE url.domain == '{{service_domain}}' | LIMIT 200"
        timeout_seconds: 30
    - tool: run_es_query
      description: Compute latency percentiles over the alert window
      args_template:
        query_type: esql
        index_pattern: "heartbeat-*"
        query: "FROM heartbeat-* | WHERE url.domain == '{{service_domain}}' | STATS total=count(*), p95=percentile(http.rtt.total.us,95), p99=percentile(http.rtt.total.us,99)"
    - tool: run_es_query
      description: Status code distribution
      args_template:
        query_type: esql
        index_pattern: "heartbeat-*"
        query: "FROM heartbeat-* | WHERE url.domain == '{{service_domain}}' | STATS total=count(*) BY http.response.status_code | SORT total DESC | LIMIT 20"
